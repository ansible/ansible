---
- hosts: all
  gather_facts: no
  tasks:
    # TODO: test plugin_loader caching
    # test legacy scope adjacent to the playbook and in roles
    # test loading builtin and legacy override in same play

    # Note: filter plugin tests are actually testing the FilterModule name, which can contain multiple filter plugins
    - name: test legacy filter plugins
      assert:
        that:
          - item.filter_file_name == 'legacy_filters'
      loop:
        - "{{ 'data' | legacy_filter }}"
        - "{{ 'data' | ansible.legacy.legacy_filter }}"

    - name: test collection filter plugins
      assert:
        that:
          - result.filter_file_name == 'testns.testcoll.subdir.collection_filters'
      loop_control:
        loop_var: result
      loop:
        - "{{ 'data' | testns.testcoll.subdir.collection_filter }}"
        - "{{ 'data' | testns.testcoll.redirect_filter }}"

    - name: run connection test matrix
      test_connection:
        connection_name: "{{ item.name | default(omit) }}"
        connection_name_matches: "{{ item.matches | default(omit) }}"
        connection_name_mismatches: "{{ item.mismatches | default(omit) }}"
      connection: "{{ item.connection }}"
      loop:
        # Test ansible.builtin plugin
        - connection: local
          name: ansible.builtin.local
          matches:
            - ansible.builtin.local
            - local
            - ansible.legacy.local
        # ansible.legacy.local == local, so the results should be identical
        - connection: ansible.legacy.local
          name: ansible.builtin.local
          matches:
            - ansible.builtin.local
            - local
            - ansible.legacy.local
        - connection: ansible.builtin.local
          name: ansible.builtin.local
          matches:
            - ansible.builtin.local
            - local
            - ansible.legacy.local
        - connection: redirected_local
          name: ansible.builtin.local
          matches:
            - ansible.builtin.local
            - ansible.builtin.redirected_local
            - redirected_local
            - ansible.legacy.redirected_local
            - local
            - ansible.legacy.local
        - connection: ansible.legacy.redirected_local
          name: ansible.builtin.local
          matches:
            - ansible.builtin.local
            - ansible.builtin.redirected_local
            - redirected_local
            - ansible.legacy.redirected_local
            - local
            - ansible.legacy.local
        # Test legacy override
        - connection: test_connection
          name: test_connection
          matches:
            - test_connection
            - ansible.legacy.test_connection
          mismatches:
            - ansible.builtin.test_connection
        - connection: ansible.legacy.test_connection
          name: test_connection
          matches:
            - test_connection
            - ansible.legacy.test_connection
          mismatches:
            - ansible.builtin.test_connection
        # Test connection plugin
        - connection: testns.testcoll.test_connection
          name: testns.testcoll.test_connection
          matches:
            - testns.testcoll.test_connection
          mismatches:
            - testns.testcoll.subdir.test_connection
            - test_connection
        - connection: testns.testcoll.redirect1
          name: testns.testcoll.subdir.test_connection
          matches:
            - testns.testcoll.subdir.test_connection
            - testns.testcoll.redirect3
            - testns.testcoll.redirect2
            - testns.testcoll.redirect1
          mismatches:
            - testns.testcoll.test_connection
            - test_connection
